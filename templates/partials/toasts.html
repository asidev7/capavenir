{% if messages %}
<div
  x-data="{
    toasts: [{% for message in messages %}{ id: {{ forloop.counter }}, tag: '{{ message.tags|default:"info"|escapejs }}', text: '{{ message|escapejs }}' }{% if not forloop.last %},{% endif %}{% endfor %}]
  }"
  x-init="toasts.forEach(t => setTimeout(() => { toasts = toasts.filter(x => x.id !== t.id) }, 6000))"
  class="fixed top-4 inset-x-0 z-[100] flex flex-col items-center gap-2 px-4 pointer-events-none"
>
  <template x-for="t in toasts" :key="t.id">
    <div
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 -translate-y-3"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100 translate-y-0"
      x-transition:leave-end="opacity-0 -translate-y-2"
      class="pointer-events-auto w-full max-w-sm rounded-xl border px-4 py-3 text-sm font-semibold shadow-lg bg-white flex items-start gap-3"
      :class="t.tag.includes('error') ? 'border-red-200 text-red-700' : t.tag.includes('success') ? 'border-green-200 text-green-700' : 'border-blue-200 text-brand'"
    >
      <span class="flex-1" x-text="t.text"></span>
      <button type="button" class="text-gray-400 hover:text-gray-600" @click="toasts = toasts.filter(x => x.id !== t.id)">✕</button>
    </div>
  </template>
</div>
{% endif %}
