{% comment %}
Reusable "Cap Avenir" logo mark. Override via {% include "partials/logo.html" with box="w-11 h-11" icon="w-6 h-6" text="text-2xl" text_color="text-white" %}
{% endcomment %}
<span class="inline-flex items-center {{ gap|default:"gap-2.5" }}">
  <span class="{{ box|default:"w-9 h-9" }} inline-flex items-center justify-center rounded-xl bg-gradient-to-br from-brand-light via-brand to-brand-dark shadow-md shadow-brand/30 ring-1 ring-white/20 shrink-0">
    <svg class="{{ icon|default:"w-5 h-5" }}" viewBox="0 0 24 24" fill="none">
      <path d="M12 3 1 8.2l11 4.8 11-4.8L12 3Z" fill="#fff"/>
      <path d="M5 10.65v4.15c0 1.75 3.2 3.6 7 3.6s7-1.85 7-3.6v-4.15l-7 3.05-7-3.05Z" fill="#fff" fill-opacity=".55"/>
      <circle cx="20.2" cy="8.6" r="1.15" fill="#f2b134"/>
      <path d="M20.2 9.7v3.4" stroke="#f2b134" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="{{ text|default:"text-xl" }} font-extrabold title-uppercase leading-none {{ text_color|default:"text-brand" }}">Cap&nbsp;Avenir</span>
</span>
