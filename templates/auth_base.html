{% load static %}
<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cap Avenir{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { brand: '#0a3764', 'brand-dark': '#072844', 'brand-light': '#d8e8f9', accent: '#f2b134', 'accent-dark': '#d99416' },
      fontFamily: { sans: ['Roboto','ui-sans-serif','system-ui','sans-serif'] },
      keyframes: {
        'fade-in-up': { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
      },
      animation: {
        'fade-in-up': 'fade-in-up .6s ease-out both',
      },
    }}}
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:'Roboto',ui-sans-serif,system-ui,sans-serif}
    .title-uppercase{text-transform:uppercase;letter-spacing:.01em}
  </style>
</head>
<body class="h-full bg-white text-gray-900">
{% include "partials/toasts.html" %}
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
